name: Continuous deployment

on:
  push:
    tags:
      - "v*"

jobs:
  cd:
    name: Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Restore cache
        uses: Swatinem/rust-cache@v2

      - name: Audit
        if: runner.os == 'Linux'
        run: |
          if ! command -v cargo-audit >/dev/null; then
            cargo install cargo-audit --locked
          fi
          cargo audit

      - name: Tests
        run: cargo test --all-features

      - name: Build
        run: cargo build --release

      - name: Release
        uses: actions/upload-artifact@v4
        with:
          name: mpc-signer-engine
          path: target/release/
