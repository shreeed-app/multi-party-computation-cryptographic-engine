name: Release

on:
  workflow_run:
    workflows:
      - "Continuous integration"
    types:
      - completed
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mpc-signer-engine

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    name: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: release

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-bin-${{ runner.os }}-

      - name: Cache Protoc
        id: cache-protoc
        uses: actions/cache@v4
        with:
          path: /usr/bin/protoc
          key: protoc-${{ runner.os }}

      - name: Install system dependencies (if needed)
        if: steps.cache-protoc.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install cargo-make --locked
          fi

      - name: Install cargo-cyclonedx
        run: |
          if ! command -v cargo-cyclonedx >/dev/null 2>&1; then
            cargo install cargo-cyclonedx --locked
          fi

      - name: Generate SBOM
        run: cargo make sbom

      - name: Normalize SBOM filename
        run: mv mpc-signer-engine.cdx.json bom.json

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ runner.os }}-

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            --push .

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes $IMAGE_NAME:latest
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}

      - name: Cosign SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attest \
            --yes \
            --type cyclonedx \
            --predicate bom.json \
            $IMAGE_NAME:latest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            target/x86_64-unknown-linux-musl/release/
            bom.json
