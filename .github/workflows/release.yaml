name: Release

on:
  workflow_run:
    workflows:
      - "Continuous integration"
    types:
      - completed

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Ensure cargo in PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-make and cargo-cyclonedx
        run: cargo binstall -y --force cargo-make cargo-cyclonedx

      - name: Generate SBOM
        run: cargo make sbom

      - name: Rename SBOM
        run: mv mpc-signer-engine.cdx.json bom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: bom
          path: bom.json
          retention-days: 1

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: bom
          path: .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign and attest image
        run: |
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}
          cosign attest --yes --type cyclonedx --predicate bom.json $IMAGE_NAME:${{ github.sha }}
