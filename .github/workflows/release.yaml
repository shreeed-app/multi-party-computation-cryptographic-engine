name: Release

on:
  workflow_run:
    workflows:
      - "Continuous integration"
    types:
      - completed

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mpc-signer-engine

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: cargo-bins/cargo-binstall@main

      - name: Install dependencies
        run: cargo binstall cargo-make cargo-cyclonedx -y

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        run: cargo make sbom

      - name: Rename SBOM file
        run: mv mpc-signer-engine.cdx.json bom.json

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v4.0.0

      - name: Sign and attest image
        run: |
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}
          cosign attest --yes --type cyclonedx --predicate bom.json $IMAGE_NAME:${{ github.sha }}

      - uses: actions/upload-artifact@v6
        with:
          name: release-artifacts
          path: bom.json
