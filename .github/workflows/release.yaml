name: Release

on:
  workflow_run:
    workflows:
      - "Continuous integration"
    types:
      - completed
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mpc-signer-engine

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    name: Release

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install cargo-make
        run: cargo install cargo-make --locked || true

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked || true

      - name: Build MUSL binary
        run: cargo make build-musl

      - name: Generate SBOM
        run: cargo make sbom

      - name: Normalize SBOM filename
        run: mv mpc-signer-engine.cdx.json bom.json

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            --push .

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes $IMAGE_NAME:latest
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}

      - name: Cosign SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attest \
            --yes \
            --type cyclonedx \
            --predicate bom.json \
            $IMAGE_NAME:latest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            target/x86_64-unknown-linux-musl/release/
            bom.json
