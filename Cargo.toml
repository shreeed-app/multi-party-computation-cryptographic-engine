[package]
name = "mpc-signer-engine"
version = "1.0.0"
edition = "2024"
license = "MIT"
description = "Production-grade MPC cryptographic engine"

[dependencies]
rand = "0.8"
zeroize = "1.7"
subtle = "2.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.38", features = ["rt-multi-thread", "macros"] }
tonic = { version = "0.12", optional = true }
prost = { version = "0.13", optional = true }
thiserror = "1.0"
anyhow = "1.0"

[features]
default = []
grpc = ["tonic", "prost"]
