[tasks.check]
description = "Perform a cargo check."
command = "cargo"
args = ["check"]

[tasks.test]
description = "Run tests with all features."
command = "cargo"
args = ["test", "--all-features"]

[tasks.fmt]
description = "Check code formatting."
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.lint]
description = "Run Clippy linter."
command = "cargo"
args = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.clean]
description = "Clean the project."
command = "cargo"
args = ["clean"]

[tasks.update]
description = "Update dependencies."
command = "cargo"
args = ["update"]

[tasks.upgrade]
description = "Upgrade dependencies to the latest versions."
command = "cargo"
args = ["upgrade"]

[tasks.build]
description = "Build the project in release mode."
command = "cargo"
args = ["build", "--release"]

[tasks.build-musl]
description = "Build Linux MUSL binary using Docker."
command = "docker"
args = [
    "run",
    "--rm",
    "--platform=linux/amd64",
    "-v",
    "${CARGO_MAKE_WORKING_DIRECTORY}:/app",
    "-w",
    "/app",
    "rust:1-alpine",
    "sh",
    "-c",
    "apk add --no-cache musl-dev protobuf && cargo build --release",
]

[tasks.sbom]
description = "Generate SBOM using cargo-cyclonedx."
command = "cargo"
args = [
    "cyclonedx",
    "--format",
    "json",
    "--target",
    "x86_64-unknown-linux-musl",
]

[tasks.docker]
description = "Build the Docker image using Docker Buildx."
script = "docker buildx build --platform=linux/amd64 -t app:latest --load ."

[tasks.release]
description = "Create a release build and Docker image."
dependencies = ["build-musl", "docker"]

[tasks.run]
description = "Run the project."
command = "cargo"
args = ["run"]

[tasks.deny]
description = "Run cargo-deny to check for license and security issues."
command = "cargo"
args = ["deny", "check"]

[tasks.audit]
description = "Run cargo-audit to check for vulnerabilities."
command = "cargo"
args = ["audit"]

[tasks.dev]
description = "Local developer checks."
dependencies = ["fmt", "check", "test"]

[tasks.bench]
description = "Run benchmarks with all features."
command = "cargo"
args = ["bench", "--all-features"]

[tasks.ci]
description = "Full CI quality check pipeline."
dependencies = ["fmt", "check", "lint", "test", "deny", "audit"]

[tasks.miri]
description = "Run Miri."
command = "cargo"
args = ["miri", "test"]
toolchain = "nightly"

[tasks.act-ci]
description = "Run GitHub Actions CI locally on Ubuntu using act."
command = "act"
args = [
    "-W",
    ".github/workflows/ci.yaml",
    "-P",
    "ubuntu-latest=ghcr.io/catthehacker/ubuntu:full-latest",
    "--container-architecture",
    "linux/amd64",
]
