[tasks.sort]
description = "Sort the Cargo.toml dependencies."
category = "Maintenance"
command = "cargo"
install_crate = "cargo-sort"
args = ["sort", "--workspace"]

[tasks.unused-deps]
description = "Detect unused dependencies in the Cargo.toml file using cargo-machete."
category = "Maintenance"
install_crate = "cargo-machete"
command = "cargo"
args = ["machete"]

[tasks.check]
description = "Perform a cargo check."
category = "Development"
command = "cargo"
args = ["check"]

[tasks.test]
description = "Run tests with all features."
category = ""
command = "cargo"
args = ["test", "--all-features"]

[tasks.fmt-check]
description = "Check code formatting."
category = "Development"
command = "cargo"
env = { RUSTUP_TOOLCHAIN = "nightly" }
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt]
description = "Check code formatting."
category = "Development"
command = "cargo"
env = { RUSTUP_TOOLCHAIN = "nightly" }
args = ["fmt", "--all"]

[tasks.lint]
description = "Run Clippy linter."
category = "Development"
command = "cargo"
args = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.clean]
description = "Clean the project."
category = "Maintenance"
command = "cargo"
args = ["clean"]

[tasks.update]
description = "Update dependencies."
category = "Maintenance"
command = "cargo"
args = ["update"]

[tasks.upgrade]
description = "Upgrade dependencies to the latest versions."
category = "Maintenance"
install_crate = "cargo-upgrade"
command = "cargo"
args = ["upgrade"]

[tasks.build]
description = "Build the project in release mode."
category = "Build"
command = "cargo"
args = ["build", "--release"]

[tasks.build-musl]
description = "Build Linux MUSL binary using Docker."
category = "Build"
command = "docker"
args = [
    "run",
    "--rm",
    "--platform=linux/amd64",
    "-v",
    "${CARGO_MAKE_WORKING_DIRECTORY}:/app",
    "-w",
    "/app",
    "rust:1-alpine",
    "sh",
    "-c",
    "apk add --no-cache musl-dev protobuf && cargo build --release",
]

[tasks.sbom]
description = "Generate SBOM using cargo-cyclonedx."
category = "Security"
install_crate = "cargo-cyclonedx"
command = "cargo"
args = [
    "cyclonedx",
    "--format",
    "json",
    "--target",
    "x86_64-unknown-linux-musl",
]

[tasks.docker]
description = "Build the Docker image using Docker Buildx."
category = "Build"
script = "docker buildx build --platform=linux/amd64 -t app:latest --load ."

[tasks.release]
description = "Create a release build and Docker image."
category = "Release"
dependencies = ["build-musl", "docker"]

[tasks.run-node]
description = "Run the project as node."
command = "cargo"
args = ["run", "--", "node", "--config", "config/node.toml"]

[tasks.run-controller]
description = "Run the project as controller."
command = "cargo"
args = ["run", "--", "controller", "--config", "config/controller.toml"]

[tasks.deny]
description = "Run cargo-deny to check for license and security issues."
category = "Security"
install_crate = "cargo-deny"
command = "cargo"
args = ["deny", "check"]

[tasks.audit]
description = "Run cargo-audit to check for vulnerabilities."
category = "Security"
install_crate = "cargo-audit"
command = "cargo"
args = ["audit"]

[tasks.dev]
description = "Local developer checks."
dependencies = ["fmt", "check", "test"]

[tasks.bench]
description = "Run benchmarks with all features."
category = "Development"
command = "cargo"
args = ["bench", "--all-features"]

[tasks.dylint]
description = "Run dylint lints."
category = "Development"
install_crate = "dylint"
command = "cargo"
args = ["dylint", "--all", "--no-deps"]

[tasks.ci]
description = "Full CI quality check pipeline."
category = "CI"
dependencies = ["fmt-check", "check", "lint", "dylint", "test", "deny", "audit"]

[tasks.ci-apply]
description = "Full CI quality check pipeline with automatic fixes."
category = "CI"
dependencies = ["fmt", "check", "lint", "dylint", "test", "deny", "audit"]

[tasks.miri]
description = "Run Miri."
category = "Development"
command = "cargo"
args = ["miri", "test"]
toolchain = "nightly"

[tasks.act-ci]
description = "Run GitHub Actions CI locally on Ubuntu using act."
category = "CI"
command = "act"
args = [
    "-W",
    ".github/workflows/ci.yaml",
    "-P",
    "ubuntu-latest=ghcr.io/catthehacker/ubuntu:full-latest",
    "--container-architecture",
    "linux/amd64",
    "--secret-file",
    ".secrets",
    "--rm",
]

[tasks.act-miri]
description = "Run GitHub Actions Miri locally on Ubuntu using act."
category = "CI"
command = "act"
args = [
    "workflow_dispatch",
    "-W",
    ".github/workflows/miri.yaml",
    "-P",
    "ubuntu-latest=ghcr.io/catthehacker/ubuntu:full-latest",
    "--container-architecture",
    "linux/amd64",
    "--secret-file",
    ".secrets",
    "--rm",
]
