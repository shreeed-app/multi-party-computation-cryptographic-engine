# Controller configuration file.

[ipc]
# Address where the controller IPC server listens.
address = "127.0.0.1:6000"

[ipc.auth]
# Shared token expected by nodes for authentication.
token = "0"

# Nodes to connect to.
[[nodes]]
endpoint = "http://127.0.0.1:50051"
participant_identifier = 1
[[nodes.auth]]
token = "1"

[[nodes]]
endpoint = "http://127.0.0.1:50052"
participant_identifier = 2
[[nodes.auth]]
token = "2"

[[nodes]]
endpoint = "http://127.0.0.1:50053"
participant_identifier = 3
[[nodes.auth]]
token = "3"
