# Node configuration file.

[ipc]
# Logical node identifier.
node_id = "1"
# Participant ID used inside MPC
participant_id = 1

# Address to bind the gRPC IPC server
address = "127.0.0.1:50051"

# Session time-to-live (seconds)
ttl_seconds = 60

[ipc.auth]
# Shared token expected from controller.
token = "1"

[vault]
# Vault base URL.
address = "http://127.0.0.1:8200"

# KV mount name.
mount = "secret"

# Prefix inside the mount where shares are stored.
prefix = "mpc/shares"

# JSON field that contains base64 share payload.
field = "share"

# Optional enterprise namespace (set to null if unused).
# namespace = "namespace"

# Vault token (prefer environment variable in production).
token = "token"
