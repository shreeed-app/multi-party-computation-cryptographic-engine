services:
  engine:
    image: app:latest
    ports:
      - "50051:50051"
    environment:
      - VAULT_TOKEN=${VAULT_TOKEN}
    volumes:
      - ./config:/app/config:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
