syntax = "proto3";

package signer.v1;

option go_package = "signer_pb";
option java_package = "com.signer.v1";

/// Service for managing multi-party computation (MPC) signing sessions.
/// It provides methods to start, submit data for, finalize, and abort 
/// signing sessions.
service MpcSigner {
  // Start a new signing session.
  rpc StartSession (StartSessionRequest)
      returns (StartSessionResponse);

  // Submit data for a given signing round.
  rpc SubmitRound (SubmitRoundRequest)
      returns (SubmitRoundResponse);

  // Finalize the session and return the signature.
  rpc FinalizeSession (FinalizeSessionRequest)
      returns (FinalizeSessionResponse);

  // Abort a session explicitly.
  rpc AbortSession (AbortSessionRequest)
      returns (AbortSessionResponse);
}

/// Request to start a new signing session.
message StartSessionRequest {
  /// Identifier of the key share.
  string key_id = 1;
  /// Algorithm (e.g., "secp256k1", "ed25519").
  string algorithm = 2;
  /// Number of required signers t.
  uint32 threshold = 3;
  /// // Number of participants n.
  uint32 participants = 4;
  /// Message to sign (pre-hash or raw).
  bytes message = 5;
}

/// Response containing the session ID.
message StartSessionResponse {
  /// Unique session identifier.
  string session_id = 1;
}

/// Request to submit data for a signing round.
message SubmitRoundRequest {
  /// Unique session identifier.
  string session_id = 1;
  /// Round number.
  uint32 round = 2;
  /// Opaque MPC data for this round.
  bytes payload = 3;
}

/// Response containing data for the next round or final signature.
message SubmitRoundResponse {
  /// Opaque MPC response.
  bytes payload = 1;
  /// Whether this round completes the protocol.
  bool is_final = 2;
}

/// Request to finalize the signing session.
message FinalizeSessionRequest {
  /// Unique session identifier.
  string session_id = 1;
}

/// Response containing the final signature.
message FinalizeSessionResponse {
  /// Chain-compatible signature bytes.
  bytes signature = 1;
}

/// Request to abort an ongoing signing session.
message AbortSessionRequest {
  /// Unique session identifier.
  string session_id = 1;
  /// Reason for aborting the session.
  string reason = 2;
}

/// Response confirming the session has been aborted.
message AbortSessionResponse {}
